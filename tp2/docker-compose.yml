services:
  database:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: tp2db
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data

  api:
    build: ./SujetTP2/api
    environment:
      DB_HOST: database
      DB_PORT: 5432
      DB_NAME: tp2db
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      PORT: 3000
    depends_on:
      - database
    restart: on-failure
    ports:
      - "3000:3000"

  frontend:
    build: ./SujetTP2/frontend
    ports:
      - "8080:80"
    depends_on:
      - api

  adminer:
    image: adminer:latest
    environment:
      ADMINER_DEFAULT_SERVER: database
    ports:
      - "8081:8080"
    depends_on:
      - database

volumes:
  db_data: